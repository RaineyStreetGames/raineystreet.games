  <ellipse cx="355" cy="160" rx="40" ry="34" fill="#265022"/>
  <ellipse cx="368" cy="142" rx="34" ry="48" fill="#163818" opacity="0.44"/>
  <ellipse cx="334" cy="98"  rx="20" ry="26" fill="#3a6a2c" opacity="0.46"/>
  <rect x="348" y="172" width="15" height="14" rx="2" fill="#3a2210"/>

