  <ellipse cx="1444" cy="72"  rx="36" ry="40" fill="#2c5624"/>
  <ellipse cx="1492" cy="108" rx="40" ry="54" fill="#2c5624"/>
  <ellipse cx="1382" cy="104" rx="42" ry="54" fill="#2c5624"/>
  <ellipse cx="1435" cy="162" rx="50" ry="38" fill="#2c5624"/>
  <ellipse cx="1422" cy="136" rx="44" ry="60" fill="#183a14" opacity="0.48"/>
  <ellipse cx="1462" cy="90"  rx="26" ry="32" fill="#3c7032" opacity="0.50"/>
  <rect x="1427" y="170" width="17" height="16" rx="3" fill="#3a2210"/>

  <ellipse cx="1245" cy="134" rx="46" ry="66" fill="#265022"/>
  <ellipse cx="1252" cy="86"  rx="28" ry="34" fill="#265022"/>
  <ellipse cx="1292" cy="112" rx="32" ry="46" fill="#265022"/>
  <ellipse cx="1206" cy="110" rx="34" ry="48" fill="#265022"/>
  <ellipse cx="1245" cy="160" rx="40" ry="34" fill="#265022"/>
  <ellipse cx="1232" cy="142" rx="34" ry="48" fill="#163818" opacity="0.44"/>
