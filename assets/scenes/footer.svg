    <pattern id="grain" x="0" y="0" width="13" height="1" patternUnits="userSpaceOnUse">
      <rect x="4" y="0" width="1" height="1" fill="#000" opacity="0.07"/>
      <rect x="9" y="0" width="1" height="1" fill="#000" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- LAYER 1: TREES                                           -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <ellipse cx="165" cy="126" rx="58" ry="80" fill="#2c5624"/>
