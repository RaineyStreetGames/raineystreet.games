<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 424" width="1600" height="424" preserveAspectRatio="none">
  <defs>
    <pattern id="bp" x="0" y="0" width="13" height="1" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="11" height="1" fill="#8a5c35"/>
      <rect x="11" y="0" width="2" height="1" fill="#180a04"/>
