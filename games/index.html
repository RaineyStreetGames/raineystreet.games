<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#30343e" />
  <meta name="description" content="Browse all games from Rainey Street Games — small indie titles built around curiosity, discovery, and exploration." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://raineystreetgames.github.io/raineystreet.games/games" />
  <meta property="og:title" content="Games — Rainey Street Games" />
  <meta property="og:description" content="Browse all games from Rainey Street Games — small indie titles built around curiosity, discovery, and exploration." />
  <meta property="og:image" content="https://raineystreetgames.github.io/raineystreet.games/assets/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Games — Rainey Street Games</title>
  <base href="/raineystreet.games/" />
  <link rel="icon" href="assets/favicon/favicon.ico" sizes="any" />
  <link rel="icon" href="assets/favicon/favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="assets/favicon/favicon-16x16.png" type="image/png" sizes="16x16" />
  <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/style.css" />
</head>

<body>

  <!-- Nav injected by components/nav.js -->
  <script src="components/nav.js"></script>

  <section class="page-hero">
    <div class="page-hero-inner">
      <h1 class="page-title" data-animate="fade-up">Games</h1>
      <p class="page-sub" data-animate="fade-up" style="--delay: 0.1s">
        Everything we've built and everything we're building.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="section-inner">
      <div class="game-capsules">
        <a class="game-capsule" href="games/kithwind/legends" data-animate="fade-up">
          <img class="game-capsule-img" src="games/kithwind/legends/screenshot.png" alt="Kithwind: Legends" />
          <div class="game-capsule-label">Kithwind: Legends</div>
        </a>
        <a class="game-capsule" href="games/kithwind/wilds" data-animate="fade-up" style="--delay: 0.05s">
          <img class="game-capsule-img" src="games/kithwind/wilds/screenshot.png" alt="Kithwind: Wilds" />
          <div class="game-capsule-label">Kithwind: Wilds</div>
        </a>
        <a class="game-capsule" href="games/dungeons" data-animate="fade-up" style="--delay: 0.10s">
          <img class="game-capsule-img" src="games/dungeons/screenshot.png" alt="Dungeon Buddies" />
          <div class="game-capsule-label">Dungeon Buddies</div>
        </a>
        <a class="game-capsule" href="games/wubs" data-animate="fade-up" style="--delay: 0.15s">
          <img class="game-capsule-img" src="games/wubs/screenshot.png" alt="Wubs" />
          <div class="game-capsule-label">Wubs</div>
        </a>
        <a class="game-capsule" href="games/transportationday" data-animate="fade-up" style="--delay: 0.20s">
          <img class="game-capsule-img" src="games/transportationday/screenshot.png" alt="Transportation Day" />
          <div class="game-capsule-label">Transportation Day</div>
        </a>
        <a class="game-capsule" href="games/boxster" data-animate="fade-up" style="--delay: 0.25s">
          <img class="game-capsule-img" src="games/boxster/screenshot.png" alt="Boxster" />
          <div class="game-capsule-label">Boxster</div>
        </a>
        <a class="game-capsule" href="games/beneaththesurface" data-animate="fade-up" style="--delay: 0.30s">
          <img class="game-capsule-img" src="games/beneaththesurface/screenshot.png" alt="Beneath the Surface" />
          <div class="game-capsule-label">Beneath the Surface</div>
        </a>
      </div>
    </div>
  </section>

  <footer class="site-footer"></footer>

  <script src="components/footer.js"></script>
  <script src="static/main.js"></script>
  <script>
    document.querySelectorAll('.game-capsule-img').forEach((img) => {
      img.onerror = () => img.closest('.game-capsule').classList.add('no-screenshot');
    });
  </script>
</body>

</html>
